<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 6.2</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <script>
        var nome = window.prompt("Qual seu nome? ")
        document.write(`seu nome tem ${nome.length} `)
        document.writeln(`Seu nome em maiusculas e ${nome.toUpperCase()}`)
        document.writeln(`Seu nome em minusculas e ${nome.toLowerCase()}`)
    </script>
</body>
</html>
